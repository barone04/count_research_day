name: Daily Update

on:
  schedule:
    - cron: "5 17 * * *" # 00:05 Asia/Bangkok (UTC+7)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-counter:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README counter
        run: python days_free.py

      - name: Commit and push changes
        run: |
          git config user.name "barone04"
          git config user.email "132360391+barone04@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update daily counter"
          git push
